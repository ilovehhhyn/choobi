# Immutable deterministic ceilings. Repository SOP prose may narrow behavior but cannot
# override these values; prose judgment lives in style.md.

version: 1

# The writable documentation surface (repo-relative glob patterns). Nothing outside this
# set is ever written, regardless of what the model proposes. This is a hard ceiling.
allowlist:
  - "README.md"
  - "HOW_CHOOBI_WORKS.md"
  - "**/README.md"
  - "docs/**/*.md"
  - "docs/**/*.mdx"
  - "build-plan.md"
  - "*-plan.md"
  - "docs/**/*-plan.md"

# Secret-shaped content is rejected from any written output (build-plan §5.6).
secret_patterns:
  - "sk-ant-[A-Za-z0-9_-]{16,}"
  - "sk-[A-Za-z0-9]{24,}"
  - "AKIA[0-9A-Z]{16}"
  - "ghp_[A-Za-z0-9]{36}"
  - "-----BEGIN [A-Z ]*PRIVATE KEY-----"
